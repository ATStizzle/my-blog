name: Generate blog post

on:
  schedule:
    # Runs every Monday at 13:00 UTC. Edit as you like (crontab.guru helps).
    - cron: "0 13 * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_post.py

      - name: Commit and push posts.json
        run: |
          git config user.name "blog-bot"
          git config user.email "blog-bot@users.noreply.github.com"
          git add posts.json
          git diff --cached --quiet || git commit -m "New auto-generated blog post"
          git push
